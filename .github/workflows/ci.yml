name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pin to a specific chromium build. Update to latest from:
  # https://github.com/bblanchon/pdfium-binaries/releases
  PDFIUM_VERSION: "7763"
  # Pinned libmobi commit SHA for the Windows MOBI test job. Mirrors
  # the `LIBMOBI_VERSION` in release.yml — drift between the two is
  # caught by the test in `src-tauri/src/release_workflow_test.rs`.
  # Pinning a full SHA (rather than a tag) means a retargeted upstream
  # tag cannot silently change what the CI runner builds against.
  #
  # Current pin: tag v0.12 (https://github.com/bfabiszewski/libmobi/releases/tag/v0.12)
  LIBMOBI_VERSION: "85dcfe803fc2a21020ddcf15c3eb66b93d388add"

jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libmobi-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache pdfium
        id: cache-pdfium
        uses: actions/cache@v4
        with:
          path: src-tauri/resources
          key: pdfium-${{ env.PDFIUM_VERSION }}-linux-x64

      - name: Download pdfium
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        run: |
          mkdir -p src-tauri/resources /tmp/pdfium-extracted
          curl -L -o /tmp/pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${{ env.PDFIUM_VERSION }}/pdfium-linux-x64.tgz"
          tar xzf /tmp/pdfium.tgz -C /tmp/pdfium-extracted
          cp /tmp/pdfium-extracted/lib/libpdfium.so src-tauri/resources/

      - name: Run cargo test (default features)
        working-directory: src-tauri
        run: cargo test

      # Exercise the mobi feature path so the libmobi-linked code compiles
      # and its unit tests run under CI. Kept as a separate step (not a
      # matrix) so default-feature breakage is still visible independently.
      - name: Run cargo test (--features mobi)
        working-directory: src-tauri
        run: cargo test --features mobi

      # `cargo test` from src-tauri/ only builds src-tauri's test binary —
      # folio-core's unit tests (which carry the MOBI adapter smoke suite)
      # are not compiled by that invocation even with `--features mobi`.
      # Run them explicitly so regressions in folio-core actually fail CI.
      #
      # The fetch step pulls the gitignored MOBI corpus from Project
      # Gutenberg; without it the fixture-gated smoke tests skip silently
      # and we lose the end-to-end coverage they exist to provide. The
      # fetch script pins each file by SHA-256 and retries transient
      # network failures, so a bad download either succeeds after a
      # retry or fails the job loudly.
      #
      # Cache the downloaded fixtures so the happy path (URL + hash
      # unchanged) doesn't hit Gutenberg on every CI run. The cache key
      # includes the script hash, so any edit to URLs or pinned hashes
      # invalidates the cache automatically.
      - name: Cache MOBI test corpus
        uses: actions/cache@v4
        with:
          path: src-tauri/test-fixtures
          key: mobi-corpus-${{ hashFiles('scripts/fetch-mobi-test-corpus.sh') }}

      - name: Fetch MOBI test corpus
        run: ./scripts/fetch-mobi-test-corpus.sh

      - name: Run cargo test (folio-core, --features mobi)
        run: cargo test -p folio-core --features mobi

  lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libmobi-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Ensure resources dir exists with placeholder
        run: mkdir -p src-tauri/resources && touch src-tauri/resources/.gitkeep

      - name: cargo clippy (default features)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # Lint the mobi feature too so clippy catches regressions in the
      # libmobi-gated code paths.
      - name: cargo clippy (--features mobi)
        working-directory: src-tauri
        run: cargo clippy --features mobi -- -D warnings

      - name: cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --check

  test-mobi-macos:
    # Second-class smoke test for the mobi feature on macOS (Linux is the
    # primary test runner). libmobi on macOS uses a different iconv (Apple's
    # libiconv vs GNU libiconv on Linux), so keeping a macOS runner catches
    # platform-specific regressions in the FFI layer before release.
    name: Rust Tests (macOS, --features mobi)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libmobi
        run: brew install libmobi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Separate cache bucket from the Linux job; macOS builds produce
          # incompatible artifacts.
          key: macos-mobi

      - name: Cache pdfium
        id: cache-pdfium
        uses: actions/cache@v4
        with:
          path: src-tauri/resources
          key: pdfium-${{ env.PDFIUM_VERSION }}-macos-univ

      - name: Download pdfium
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        run: |
          mkdir -p src-tauri/resources /tmp/pdfium-extracted
          curl -L -o /tmp/pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${{ env.PDFIUM_VERSION }}/pdfium-mac-univ.tgz"
          tar xzf /tmp/pdfium.tgz -C /tmp/pdfium-extracted
          cp /tmp/pdfium-extracted/lib/libpdfium.dylib src-tauri/resources/

      - name: Run cargo test (--features mobi)
        working-directory: src-tauri
        run: cargo test --features mobi

      # The folio-core MOBI smoke tests are intentionally only wired
      # into the Linux job. When they ran here on macos-latest the
      # test process reliably SIGKILLed partway through — libmobi's
      # iconv code path crashes on macOS Tahoe arm64 at process exit
      # (the same bug MobiBook already works around for single-string
      # decodes by avoiding the PalmDB name field; the full folio-core
      # test binary re-opens many MOBIs in sequence and the crash
      # resurfaces at cleanup). The src-tauri step above already
      # verifies libmobi links and loads correctly on this runner;
      # Linux is the authoritative home for the smoke suite.

  test-mobi-windows:
    # Catches MSVC + libmobi FFI regressions on PRs rather than at
    # tag-push time. Linux remains the authoritative MOBI smoke-test
    # home; this job only proves the Windows build pipeline (CMake
    # build of libmobi → bindgen → MSVC link → folio-core unit tests)
    # still works. Smoke tests gated on the MOBI corpus are not run
    # here — they require the Project Gutenberg fetch script which
    # hits the network from Windows runners and adds time without
    # adding meaningful coverage over the Linux runner.
    name: Rust Tests (Windows, --features mobi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Separate cache bucket from the Linux/macOS jobs; Windows
          # builds produce incompatible artifacts.
          key: windows-mobi

      # Same build recipe as release.yml. Kept inline (rather than as
      # a composite action) because the duplication is small and
      # extracting an action would obscure where the libmobi build
      # steps actually run.
      - name: Cache libmobi (Windows)
        id: cache-libmobi-windows
        uses: actions/cache@v4
        with:
          path: .libmobi-windows
          # Suffix encodes the build flavor (link kind + which optional
          # deps are off). Must match the key in release.yml so a single
          # cache shape covers both pipelines and a flavor change in
          # release surfaces here too.
          key: libmobi-${{ env.LIBMOBI_VERSION }}-windows-x64-static-nozlib-nolibxml2-v1

      - name: Build libmobi (Windows)
        if: steps.cache-libmobi-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $src = "$env:RUNNER_TEMP\libmobi-src"
          $build = "$env:RUNNER_TEMP\libmobi-build"
          $prefix = "$env:GITHUB_WORKSPACE\.libmobi-windows"
          # Clone + checkout-by-SHA: `git clone --branch` does not
          # accept commit SHAs, and we pin SHAs (not tags) to keep
          # the upstream source bytes immutable. The post-checkout
          # `rev-parse` assertion catches any drift between the SHA
          # we asked for and what landed in the working tree.
          git clone https://github.com/bfabiszewski/libmobi.git $src
          git -C $src checkout "$env:LIBMOBI_VERSION"
          $head = git -C $src rev-parse HEAD
          if ($head.Trim() -ne $env:LIBMOBI_VERSION) {
            throw "libmobi checkout drifted: expected $env:LIBMOBI_VERSION, got $head"
          }
          # BUILD_SHARED_LIBS=OFF + USE_ZLIB=OFF + USE_LIBXML2=OFF
          # produces a fully self-contained `mobi.lib` static archive.
          # Static linkage on Windows matches the release pipeline so
          # MSVC regressions in the static-link path are caught here
          # before tag-push. See `windows_libmobi_build_is_static`
          # in src-tauri/src/release_workflow_test.rs for rationale.
          cmake -B $build -S $src `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DUSE_LIBXML2=OFF `
            -DUSE_ZLIB=OFF `
            -DCMAKE_INSTALL_PREFIX="$prefix"
          # Build everything and tolerate cmake --build's non-zero
          # exit — see release.yml for the full rationale. tl;dr:
          # libmobi's tools/ CLIs link-fail on MSVC, but mobi.lib
          # itself builds; --target mobi alone skips the miniz
          # OBJECT lib (no .vcxproj for OBJECT libs in MSBuild),
          # so we have to take the whole build and ignore the
          # tools' failure.
          $oldPref = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          cmake --build $build --config Release --parallel
          $PSNativeCommandUseErrorActionPreference = $oldPref
          if (-not (Test-Path "$build\src\Release\mobi.lib")) {
            throw "cmake --build did not produce mobi.lib"
          }
          # Archive miniz's OBJECT-library output into mobi.lib so the
          # static archive is self-contained when consumed by cargo —
          # search the whole build tree because libmobi compiles
          # miniz.c in two places (src/miniz target + tools/zip
          # target); either object provides the symbols mobi.lib
          # needs. See release.yml for the full rationale.
          $minizObj = Get-ChildItem "$build" -Recurse -Filter "miniz*.obj" | Select-Object -First 1
          if ($null -eq $minizObj) {
            throw "Could not locate built miniz object file under $build — libmobi CMake layout changed?"
          }
          Write-Host "Merging $($minizObj.FullName) into mobi.lib"
          & lib /NOLOGO "/OUT:$build\src\Release\mobi.lib" "$build\src\Release\mobi.lib" $minizObj.FullName
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed merging miniz into mobi.lib (exit $LASTEXITCODE)" }
          # libmobi v0.12 defines no `install()` rules; copy the static
          # archive + public header into the prefix by hand. See
          # release.yml for the full rationale.
          New-Item -ItemType Directory -Force -Path "$prefix\lib", "$prefix\include" | Out-Null
          Copy-Item "$build\src\Release\mobi.lib" "$prefix\lib\mobi.lib"
          Copy-Item "$src\src\mobi.h" "$prefix\include\mobi.h"

      # Runs on both cache hit and cache miss so a corrupted or
      # mis-flavored cache fails loudly rather than letting the
      # cargo test step link against the wrong artifact.
      - name: Verify libmobi artifacts (Windows)
        shell: pwsh
        run: |
          $prefix = "$env:GITHUB_WORKSPACE\.libmobi-windows"
          $expectedLib = Join-Path $prefix "lib\mobi.lib"
          $expectedHdr = Join-Path $prefix "include\mobi.h"
          $expectedDll = Join-Path $prefix "bin\mobi.dll"
          foreach ($p in @($expectedLib, $expectedHdr)) {
            if (-not (Test-Path $p)) {
              throw "libmobi artifact missing: $p — cache flavor mismatch?"
            }
          }
          # Static build expects no DLL; a DLL on disk means a stale
          # shared-build cache leaked in.
          if (Test-Path $expectedDll) {
            throw "Unexpected mobi.dll at $expectedDll — cache contains a shared (DLL) build, but ci expects a static (mobi.lib) one. Bump the cache-key suffix."
          }

      # folio-core/build.rs uses pkg-config first, then falls back to
      # LIBMOBI_INCLUDE_DIR + LIBMOBI_LIB_DIR. Windows MSVC has no
      # pkg-config in PATH by default, so the fallback is the path
      # actually exercised here. Static linkage means the test binary
      # has no runtime DLL dependency — no PATH manipulation needed.
      - name: Run cargo test (folio-core, --features mobi)
        shell: pwsh
        run: |
          $env:LIBMOBI_INCLUDE_DIR = "$env:GITHUB_WORKSPACE\.libmobi-windows\include"
          $env:LIBMOBI_LIB_DIR = "$env:GITHUB_WORKSPACE\.libmobi-windows\lib"
          cargo test -p folio-core --features mobi

  frontend-check:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript type check
        run: pnpm run type-check

      - name: Run tests
        run: pnpm run test
