name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pin to a specific chromium build. Update to latest from:
  # https://github.com/bblanchon/pdfium-binaries/releases
  PDFIUM_VERSION: "6954"

jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache pdfium
        id: cache-pdfium
        uses: actions/cache@v4
        with:
          path: src-tauri/resources
          key: pdfium-${{ env.PDFIUM_VERSION }}-linux-x64

      - name: Download pdfium
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        run: |
          mkdir -p src-tauri/resources /tmp/pdfium-extracted
          curl -L -o /tmp/pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${{ env.PDFIUM_VERSION }}/pdfium-linux-x64.tgz"
          tar xzf /tmp/pdfium.tgz -C /tmp/pdfium-extracted
          cp /tmp/pdfium-extracted/lib/libpdfium.so src-tauri/resources/

      - name: Run cargo test
        working-directory: src-tauri
        run: cargo test

  lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Ensure resources dir exists with placeholder
        run: mkdir -p src-tauri/resources && touch src-tauri/resources/.gitkeep

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --check

  frontend-check:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript type check
        run: pnpm run type-check

      - name: Run tests
        run: pnpm run test
