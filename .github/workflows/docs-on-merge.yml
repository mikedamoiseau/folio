name: Docs on merge

# When a PR is merged into main, classify the change and keep folio's in-repo
# Markdown docs in sync: CHANGELOG.md, README.md, and docs/USER_GUIDE.md.
#
# The website + published docs on damoiseau.xyz are NOT this workflow's concern.
# That site lives in a separate repo with its own Claude Code agent that pulls
# folio's latest changes on a schedule and updates its documentation itself. This
# workflow therefore touches in-repo docs ONLY and produces no website handoff.
#
# Auth: subscription OAuth token, NOT an API key.
#   1) Run `claude setup-token` locally (one-year token tied to your Team seat).
#   2) Add it as a repo secret named CLAUDE_CODE_OAUTH_TOKEN.
#   3) It's referenced below instead of anthropic_api_key.

on:
  pull_request:
    types: [closed]
    branches: [main]

# Don't let two runs for the same PR overlap.
concurrency:
  group: docs-on-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync-docs:
    # Run ONLY on a real merge (not a plain close), skip bot-authored PRs, and
    # skip the routine's own follow-up docs PR (titled "docs: ...") so it can't
    # trigger itself in a loop.
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.type != 'Bot' &&
      github.actor != 'claude[bot]' &&
      !startsWith(github.event.pull_request.title, 'docs:')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write        # commit doc edits to a branch
      pull-requests: write   # open the follow-up docs PR + comment
      id-token: write        # token minting for the action
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so the merged diff is readable

      - name: Draft release notes and sync docs
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Temporary: surface the agent's turn-by-turn output + final report in
          # the run log so a no-op success (no docs PR opened) is diagnosable.
          display_report: true
          show_full_output: true
          prompt: |
            A pull request was just merged into main of folio, a local-first
            DESKTOP app (Tauri + Rust + React) for reading and organizing EPUBs,
            PDFs, CBZ, and CBR — supported platforms are macOS, Windows, and Linux.

            Merged PR: #${{ github.event.pull_request.number }}
            Title: "${{ github.event.pull_request.title }}"

            Follow the project's CLAUDE.md conventions throughout. Keep the in-repo
            documentation surfaces below in sync. Do NOT touch the website — the
            damoiseau.xyz site is maintained by its own agent that pulls this repo
            on a schedule; you produce in-repo doc edits only, no website handoff.

            1. Read the PR. Use `gh pr view ${{ github.event.pull_request.number }}`
               and `gh pr diff ${{ github.event.pull_request.number }}` to read the
               title, description, and diff. Identify the user-visible change and
               classify it: New, Improved, Fixed, Breaking, or Internal-only.

            2. If the change is internal-only (tests, CI, build tooling, comments,
               dead-code removal, pure refactors, dependency bumps with no user
               impact), STOP. Post one comment with
               `gh pr comment ${{ github.event.pull_request.number }}
               --body "Internal change — no docs update."` and do nothing else.

            3. Otherwise, draft ONE canonical entry, written for end users (people
               reading books in the app), not contributors:
               - 2 to 4 sentences, plain language. No jargon, internal codenames,
                 file paths, function names, or commit SHAs.
               - If the change behaves differently or is only available on some
                 platforms (macOS / Windows / Linux), say which.
               - If it's a Breaking change, list exactly what users must do to
                 migrate.
               This canonical entry is the source you adapt below. Write it well once.

            4. Edit the in-repo docs:
               - CHANGELOG.md — one terse line under the matching heading
                 (New / Improved / Fixed / Breaking) in the Unreleased/top section.
                 Match the file's existing Keep a Changelog style.
               - README.md — update ONLY if the change alters folio's headline
                 capabilities. If so, slot it into the correct "Highlights"
                 subsection (Reading / Library / Catalogs, metadata, and backup).
                 Skip README for minor fixes. Keep the feature list accurate, not noisy.
               - docs/USER_GUIDE.md — add or revise the how-to: where the feature
                 lives in the UI and the steps to use it. Be as thorough as needed;
                 the brevity rule does NOT apply to this file.

            5. Voice per surface: changelog = terse imperative ("Add…", "Fix…");
               user guide = second-person instructional ("To …, open …").

            6. If any doc surface claims a capability the code doesn't have (e.g. the
               live user guide currently mentions phone access / sync, which the repo
               doesn't implement), do NOT silently delete it — flag the drift in the
               PR description so a human can decide.

            7. Output: create a branch named `docs/pr-${{ github.event.pull_request.number }}`,
               commit ONLY the in-repo doc edits (CHANGELOG / README / USER_GUIDE),
               and open a pull request whose title starts with "docs:" (this is what
               keeps the workflow from re-triggering on itself). In the PR body,
               include: the canonical entry, its classification, affected platforms,
               the list of in-repo files changed, and any drift flagged in step 6.
               Do NOT push to main directly, and do NOT edit or reference any website
               files or open any cross-repo PR.

            Keep the changelog and README entries short — long notes don't get read.
            The user guide is the one place to be thorough.

# ---------------------------------------------------------------------------
# WEBSITE (damoiseau.xyz) — NOT handled here, by design.
#
# The website lives in a separate repo with its own Claude Code agent that pulls
# folio's latest changes on a schedule and updates the published docs itself.
# This workflow commits in-repo Markdown only (CHANGELOG / README / USER_GUIDE)
# and never edits website files, emits a handoff brief, or opens a cross-repo PR.
# No Bitbucket credentials or cross-platform API calls live in this repo.
# ---------------------------------------------------------------------------
