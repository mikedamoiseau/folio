name: Release

on:
  push:
    tags:
      - 'v*'

env:
  # Pin to a specific chromium build. Update to latest from:
  # https://github.com/bblanchon/pdfium-binaries/releases
  PDFIUM_VERSION: "7763"
  # Pinned libmobi commit. The Windows build path compiles libmobi
  # from source (the project has CMake support since v0.10 — see
  # https://github.com/bfabiszewski/libmobi/blob/v0.12/CMakeLists.txt).
  #
  # Pinned to a full commit SHA rather than a moving tag so a
  # retargeted tag (or upstream takeover) cannot silently change the
  # source CMake runs against on a cache miss. The drift test in
  # `src-tauri/src/release_workflow_test.rs` enforces that this value
  # matches the equivalent pin in `ci.yml`. Bumping this invalidates
  # the libmobi cache (key includes the SHA) so the next CI run
  # rebuilds against the new revision.
  #
  # Current pin: tag v0.12 (https://github.com/bfabiszewski/libmobi/releases/tag/v0.12)
  LIBMOBI_VERSION: "85dcfe803fc2a21020ddcf15c3eb66b93d388add"

jobs:
  publish-tauri:
    name: Build & Release (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux + macOS: enable the mobi feature so MOBI/AZW/AZW3 import
          # is compiled in. Windows stays on --no-default-features; see
          # docs/USER_GUIDE.md for the platform support matrix.
          #
          # Linux carries an extra `--config tauri.linux.mobi.conf.json`
          # which overlays the `libmobi0` / `libmobi` depends into the
          # `.deb` / `.rpm` packages. The overlay is only applied when
          # `--features mobi` is on, so a hypothetical non-mobi Linux
          # build would ship honest metadata (no unneeded depends).
          - platform: ubuntu-latest
            args: '--config tauri.linux.mobi.conf.json --features mobi'
            pdfium_archive: pdfium-linux-x64.tgz
            pdfium_lib: libpdfium.so
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --features mobi'
            pdfium_archive: pdfium-mac-univ.tgz
            pdfium_lib: libpdfium.dylib
          # macos-latest runners are arm64, so Homebrew installs an
          # arm64 libmobi.dylib that can't be linked into an x86_64
          # target. Ship x86_64 Mac without MOBI rather than adding a
          # universal-libmobi build pipeline just for Intel Macs; arm64
          # Mac users keep full MOBI support. See release note below.
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            pdfium_archive: pdfium-mac-univ.tgz
            pdfium_lib: libpdfium.dylib
          # Windows: --no-default-features drops the sftp feature (the
          # services-ftp transitive dep does not build cleanly under
          # MSVC at the moment). `--features mobi` re-enables MOBI/AZW/
          # AZW3 import — libmobi is built from source as a static
          # archive (`mobi.lib`, no DLL) earlier in the job and linked
          # directly into folio.exe. See `windows_libmobi_build_is_static`
          # in src-tauri/src/release_workflow_test.rs for why static.
          - platform: windows-latest
            args: '-- --no-default-features --features mobi'
            pdfium_archive: pdfium-win-x64.tgz
            pdfium_lib: pdfium.dll

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libmobi-dev

      # libmobi (LGPL v3+) is required for the `mobi` feature. Installed from
      # Homebrew at build time; end users need libmobi installed on their
      # system (brew install libmobi) or the app will fail to start when
      # MOBI support is loaded. See docs/USER_GUIDE.md.
      #
      # Only the arm64 Mac build links against libmobi — the x86_64 matrix
      # entry ships without MOBI (see matrix comment above), so installing
      # an arm64 .dylib there is wasted work and would also trick the linker
      # into picking it up if a stray `--features mobi` ever crept in.
      - name: Install libmobi (macOS)
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'aarch64-apple-darwin')
        run: brew install libmobi

      # libmobi has no Windows package in vcpkg or any other registry
      # we ship against, but it does have first-class CMake support
      # (since v0.10) so we build a DLL from source on the runner.
      # USE_ZLIB=OFF / USE_LIBXML2=OFF picks libmobi's bundled miniz
      # and internal xmlwriter, avoiding any external dependency the
      # MSVC toolchain would otherwise need from vcpkg.
      #
      # The cache key includes both LIBMOBI_VERSION and the target
      # arch so a pin bump or arch change invalidates automatically.
      # Cache miss costs ~1–2 min on a stock windows-latest runner;
      # cache hit is a few seconds.
      #
      # The `if:` gate also requires `--features mobi` to be in the
      # Windows matrix args. Until that flip lands (W3), the libmobi
      # build is dormant on the release runner — staging the wiring
      # without burning CI minutes or adding a failure point that
      # produces no shipped artifact. PR-CI's `test-mobi-windows`
      # job (ci.yml) exercises the build path on every PR, so this
      # gate does not reduce coverage.
      - name: Cache libmobi (Windows)
        if: matrix.platform == 'windows-latest' && contains(matrix.args, '--features mobi')
        id: cache-libmobi-windows
        uses: actions/cache@v4
        with:
          path: .libmobi-windows
          # Suffix encodes the build flavor (link kind + which optional
          # deps are off). If we ever flip BUILD_SHARED_LIBS or re-enable
          # zlib/libxml2 without bumping LIBMOBI_VERSION, the cache key
          # changes too — preventing a stale cache from masquerading as
          # a fresh build of the new flavor.
          key: libmobi-${{ env.LIBMOBI_VERSION }}-windows-x64-static-nozlib-nolibxml2-v1

      - name: Build libmobi (Windows)
        if: matrix.platform == 'windows-latest' && contains(matrix.args, '--features mobi') && steps.cache-libmobi-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $src = "$env:RUNNER_TEMP\libmobi-src"
          $build = "$env:RUNNER_TEMP\libmobi-build"
          $prefix = "$env:GITHUB_WORKSPACE\.libmobi-windows"
          # Clone + checkout-by-SHA rather than `--branch <ref>`:
          # `git clone --branch` does not accept commit SHAs, and we
          # pin SHAs (not tags) to keep the upstream source bytes
          # immutable. Verify after checkout so a clone-time race
          # between `git clone` and `git checkout` cannot land us on
          # a different revision than the pinned one.
          git clone https://github.com/bfabiszewski/libmobi.git $src
          git -C $src checkout "$env:LIBMOBI_VERSION"
          $head = git -C $src rev-parse HEAD
          if ($head.Trim() -ne $env:LIBMOBI_VERSION) {
            throw "libmobi checkout drifted: expected $env:LIBMOBI_VERSION, got $head"
          }
          # BUILD_SHARED_LIBS=OFF produces a static `mobi.lib` archive
          # (no DLL). With USE_ZLIB=OFF + USE_LIBXML2=OFF the archive
          # is fully self-contained, so `cargo:rustc-link-lib=static=
          # mobi` (folio-core/build.rs) bakes libmobi into folio.exe
          # without any runtime DLL dependency. This avoids the
          # Tauri-bundler complications of placing a DLL where the
          # OS loader will find it next to the installed binary.
          cmake -B $build -S $src `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DUSE_LIBXML2=OFF `
            -DUSE_ZLIB=OFF `
            -DCMAKE_INSTALL_PREFIX="$prefix"
          # Build only the `mobi` library target. libmobi's `tools/`
          # subdirectory builds CLI binaries (mobitool, mobidrm,
          # mobimeta) that pull in `getopt` (unavailable on MSVC) and,
          # under USE_ZLIB=OFF, also fail to link the bundled miniz
          # symbols. Folio doesn't ship those binaries, so skipping
          # them avoids paying for a Windows-portability fix we'd
          # never use.
          cmake --build $build --config Release --parallel --target mobi
          # libmobi v0.12 defines no `install()` rules in any of its
          # CMakeLists, so `cmake --install` is a no-op. Copy the
          # static archive and the public header into the install
          # prefix by hand. (`mobi.h` only includes standard C headers
          # — stdio.h, stdint.h, stdbool.h, time.h — so we don't have
          # to ship libmobi's private headers alongside it.)
          New-Item -ItemType Directory -Force -Path "$prefix\lib", "$prefix\include" | Out-Null
          Copy-Item "$build\src\Release\mobi.lib" "$prefix\lib\mobi.lib"
          Copy-Item "$src\src\mobi.h" "$prefix\include\mobi.h"
          Write-Host "libmobi installed: $prefix"

      # Runs on both cache hit and cache miss so a corrupted or
      # mis-flavored cache (e.g. someone manually edited the cache key
      # without bumping the suffix) fails loudly rather than letting
      # the Tauri build link against the wrong artifact.
      - name: Verify libmobi artifacts (Windows)
        if: matrix.platform == 'windows-latest' && contains(matrix.args, '--features mobi')
        shell: pwsh
        run: |
          $prefix = "$env:GITHUB_WORKSPACE\.libmobi-windows"
          $expectedLib = Join-Path $prefix "lib\mobi.lib"
          $expectedHdr = Join-Path $prefix "include\mobi.h"
          $expectedDll = Join-Path $prefix "bin\mobi.dll"
          foreach ($p in @($expectedLib, $expectedHdr)) {
            if (-not (Test-Path $p)) {
              throw "libmobi artifact missing: $p — cache flavor mismatch?"
            }
          }
          # We build static (BUILD_SHARED_LIBS=OFF), so a DLL appearing
          # in the prefix means a previous shared-build cache leaked
          # in under a key that should not have matched.
          if (Test-Path $expectedDll) {
            throw "Unexpected mobi.dll at $expectedDll — cache contains a shared (DLL) build, but the release expects a static (mobi.lib) one. Bump the cache-key suffix."
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache pdfium
        id: cache-pdfium
        uses: actions/cache@v4
        with:
          path: src-tauri/resources
          key: pdfium-${{ env.PDFIUM_VERSION }}-${{ matrix.pdfium_archive }}

      - name: Download pdfium (Unix)
        if: steps.cache-pdfium.outputs.cache-hit != 'true' && matrix.platform != 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/resources /tmp/pdfium-extracted
          curl -L -o /tmp/pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${{ env.PDFIUM_VERSION }}/${{ matrix.pdfium_archive }}"
          tar xzf /tmp/pdfium.tgz -C /tmp/pdfium-extracted
          cp /tmp/pdfium-extracted/lib/${{ matrix.pdfium_lib }} src-tauri/resources/

      - name: Download pdfium (Windows)
        if: steps.cache-pdfium.outputs.cache-hit != 'true' && matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources
          $tmp = "$env:TEMP\pdfium-extracted"
          New-Item -ItemType Directory -Force -Path $tmp
          Invoke-WebRequest `
            -Uri "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${{ env.PDFIUM_VERSION }}/${{ matrix.pdfium_archive }}" `
            -OutFile "$env:TEMP\pdfium.tgz"
          tar xzf "$env:TEMP\pdfium.tgz" -C $tmp
          Copy-Item "$tmp\bin\${{ matrix.pdfium_lib }}" src-tauri/resources/

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # folio-core/build.rs uses pkg-config first, then falls back
          # to LIBMOBI_INCLUDE_DIR / LIBMOBI_LIB_DIR. MSVC has no
          # pkg-config in PATH on a stock runner, so the fallback is
          # the actually exercised path on Windows. On Linux/macOS
          # these env vars are empty strings — pkg-config takes over
          # via the libmobi-dev / brew install — and `Option::filter`
          # in the build script ignores empty paths gracefully.
          LIBMOBI_INCLUDE_DIR: ${{ matrix.platform == 'windows-latest' && format('{0}\.libmobi-windows\include', github.workspace) || '' }}
          LIBMOBI_LIB_DIR: ${{ matrix.platform == 'windows-latest' && format('{0}\.libmobi-windows\lib', github.workspace) || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Folio ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install this version.

            > **macOS note:** Because this app is not notarized, macOS Gatekeeper may show a "damaged" or "unidentified developer" warning. See the [installation guide](https://github.com/mikedamoiseau/folio/blob/main/docs/USER_GUIDE.md#installing) for the one-line fix.
            >
            > **MOBI / AZW / AZW3 support:** MOBI import is included on Linux, arm64 macOS, and Windows. Linux and macOS dynamically link against libmobi — install it before first MOBI open with `sudo apt install libmobi0` (Debian / Ubuntu) or `brew install libmobi` (macOS). The Windows build statically links libmobi, so no extra install is needed there. EPUB / PDF / CBZ / CBR do not need libmobi. The x86_64 (Intel) macOS build does not include MOBI support — use a different format on that platform.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
