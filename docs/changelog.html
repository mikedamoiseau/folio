  <style>
    :root {
      --bg: #faf9f7;
      --surface: #fff;
      --ink: #1a1a1a;
      --ink-muted: #666;
      --accent: #6366f1;
      --border: #e5e3df;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --surface: #242424;
        --ink: #e5e3df;
        --ink-muted: #999;
        --accent: #818cf8;
        --border: #333;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      padding: 2rem 1rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    h1 { font-size: 1.5rem; font-weight: 700; }
    h1 a { color: var(--ink); text-decoration: none; }
    h1 a:hover { text-decoration: underline; }
    .version-select {
      font-size: 0.875rem;
      padding: 0.375rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
    }
    #changelog { margin-top: 1rem; }
    .version-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .version-section h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--accent);
      scroll-margin-top: 1rem;
    }
    .version-section h3 {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
      margin: 1rem 0 0.5rem;
    }
    .version-section h3:first-of-type { margin-top: 0.25rem; }
    .version-section ul { padding-left: 1.25rem; margin: 0; }
    .version-section li {
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .version-section li strong { font-weight: 600; }
    .version-section p {
      font-size: 0.9rem;
      color: var(--ink-muted);
      margin-bottom: 0.75rem;
    }
    .fallback { text-align: center; padding: 3rem 1rem; color: var(--ink-muted); }
    .fallback a { color: var(--accent); }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--ink-muted);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>

  <script>
    (async () => {
      const container = document.getElementById("changelog");
      const selector = document.getElementById("version-jump");

      let md;
      try {
        const res = await fetch("../CHANGELOG.md");
        if (!res.ok) throw new Error(res.statusText);
        md = await res.text();
      } catch {
        const raw = atob(document.getElementById("changelog-md").textContent);
        const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
        md = new TextDecoder().decode(bytes);
      }

      const sections = [];
      let current = null;

      for (const line of md.split("\n")) {
        const versionMatch = line.match(/^## \[(.+?)\](?:\s*-\s*(.+))?/);
        if (versionMatch) {
          if (current) sections.push(current);
          current = {
            version: versionMatch[1],
            date: versionMatch[2] || "",
            lines: [],
          };
          continue;
        }
        if (current) current.lines.push(line);
      }
      if (current) sections.push(current);

      // Build HTML
      let html = "";
      for (const section of sections) {
        const id = "v-" + section.version.replace(/[^a-z0-9]/gi, "-");
        const title =
          section.version + (section.date ? " — " + section.date : "");
        html += '<div class="version-section" id="' + id + '">';
        html += "<h2>" + escapeHtml(title) + "</h2>";
        html += renderBody(section.lines);
        html += "</div>";

        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = section.version + (section.date ? " (" + section.date + ")" : "");
        selector.appendChild(opt);
      }
      container.innerHTML = html;

      selector.addEventListener("change", () => {
        const el = document.getElementById(selector.value);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        selector.value = "";
      });

      function escapeHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderBody(lines) {
        let out = "";
        let inList = false;
        for (const raw of lines) {
          const line = raw.trimEnd();
          if (line.match(/^### /)) {
            if (inList) { out += "</ul>"; inList = false; }
            out += "<h3>" + escapeHtml(line.slice(4)) + "</h3>";
          } else if (line.match(/^- /)) {
            if (!inList) { out += "<ul>"; inList = true; }
            out += "<li>" + inlineFormat(line.slice(2)) + "</li>";
          } else if (line.match(/^  - /)) {
            if (!inList) { out += "<ul>"; inList = true; }
            out += "<li>" + inlineFormat(line.slice(4)) + "</li>";
          } else if (line.trim() === "") {
            // skip blank lines
          } else {
            if (inList) { out += "</ul>"; inList = false; }
            out += "<p>" + inlineFormat(line) + "</p>";
          }
        }
        if (inList) out += "</ul>";
        return out;
      }

      function safeHref(url) {
        try {
          const scheme = new URL(url, "https://x.example").protocol;
          if (scheme === "https:" || scheme === "http:") return url;
        } catch { /* malformed URL */ }
        return null;
      }

      function inlineFormat(s) {
        return escapeHtml(s)
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/`(.+?)`/g, '<code style="font-size:0.85em;background:var(--bg);padding:0.1em 0.3em;border-radius:3px">$1</code>')
          .replace(/\[(.+?)\]\((.+?)\)/g, (_, label, href) => {
            const safe = safeHref(href);
            return safe
              ? '<a href="' + safe + '" style="color:var(--accent)">' + label + '</a>'
              : label;
          });
      }
    })();
  </script>
</body>
