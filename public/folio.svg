<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d78a63"></stop>
      <stop offset="55%" stop-color="#b66743"></stop>
      <stop offset="100%" stop-color="#8f4a2b"></stop>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"></stop>
      <stop offset="100%" stop-color="#efe2cc"></stop>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"></stop>
      <stop offset="18%" stop-color="#ffffff" stop-opacity="0.12"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="glyphShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#5e2f16" flood-opacity="0.40"></feDropShadow>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"></rect>
  <rect x="6" y="6" width="1012" height="1012" rx="224" fill="none" stroke="url(#edge)" stroke-width="12"></rect>

  
  <g filter="url(#glyphShadow)">
    <rect x="330" y="248" width="118" height="528" rx="34" fill="url(#glyph)"></rect>
    <rect x="330" y="248" width="364" height="118" rx="34" fill="url(#glyph)"></rect>
    <rect x="330" y="452" width="300" height="112" rx="34" fill="url(#glyph)"></rect>
  </g>
  
  <g stroke="#c98f6b" stroke-width="10" stroke-linecap="round" opacity="0.55">
    <line x1="389" y1="620" x2="389" y2="736"></line>
    <line x1="560" y1="277" x2="560" y2="337"></line>
    <line x1="640" y1="277" x2="640" y2="337"></line>
  </g>
</svg>